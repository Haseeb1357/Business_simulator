version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: topaz_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: topaz_sync
    ports:
      - "5432:5432"
    volumes:
      - topaz_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  topaz_data:
